groups:
  - name: openclaw_rag_monitoring
    interval: 30s
    rules:
      # RAG Search Latency Alerts
      - alert: RAGSearchHighLatency
        expr: histogram_quantile(0.95, rag_search_duration_ms) > 1000
        for: 5m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG search latency is high (P95 > 1000ms)"
          description: "RAG search P95 latency is {{ $value | humanizeDuration }} over the last 5 minutes"

      - alert: RAGSearchCriticalLatency
        expr: histogram_quantile(0.95, rag_search_duration_ms) > 2000
        for: 2m
        labels:
          severity: critical
          component: rag
        annotations:
          summary: "RAG search latency is critical (P95 > 2000ms)"
          description: "RAG search P95 latency is {{ $value | humanizeDuration }} - immediate investigation needed"

      # RAG Search Success Rate Alerts
      - alert: RAGSearchFailureRate
        expr: |
          (
            sum(rate(rag_search_success_total{success="false"}[5m]))
            /
            sum(rate(rag_search_success_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG search failure rate is elevated (> 5%)"
          description: "RAG search failure rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: RAGSearchCriticalFailure
        expr: |
          (
            sum(rate(rag_search_success_total{success="false"}[5m]))
            /
            sum(rate(rag_search_success_total[5m]))
          ) > 0.20
        for: 2m
        labels:
          severity: critical
          component: rag
        annotations:
          summary: "RAG search has critical failure rate (> 20%)"
          description: "RAG search failure rate is {{ $value | humanizePercentage }} - service may be degraded"

      # RAG Embedding Performance
      - alert: RAGEmbeddingHighLatency
        expr: histogram_quantile(0.95, rag_embedding_time_ms) > 500
        for: 5m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG embedding latency is high (P95 > 500ms)"
          description: "RAG embedding P95 latency is {{ $value | humanizeDuration }}"

      # RAG Vector Search Performance
      - alert: RAGVectorSearchHighLatency
        expr: histogram_quantile(0.95, rag_vector_search_time_ms) > 200
        for: 5m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG vector search latency is high (P95 > 200ms)"
          description: "RAG vector search P95 latency is {{ $value | humanizeDuration }}"

      # RAG Index Size Growth
      - alert: RAGIndexSizeGrowth
        expr: |
          (
            rate(rag_index_size_bytes[24h]) > (100 * 1024 * 1024)
          )
        for: 1h
        labels:
          severity: info
          component: rag
        annotations:
          summary: "RAG index is growing rapidly (> 100MB per day)"
          description: "RAG index growth rate is {{ $value | humanize }}B/day"

      # RAG Index Vector Count Anomaly
      - alert: RAGIndexVectorCountAnomalies
        expr: |
          abs(rag_index_vector_count - avg_over_time(rag_index_vector_count[24h]))
          /
          avg_over_time(rag_index_vector_count[24h]) > 0.5
        for: 10m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG index vector count has anomalous changes (>50% deviation)"
          description: "Current vector count is {{ $value | humanize }}, which deviates significantly from 24h average"

      # Low Relevance Score Alert
      - alert: RAGLowRelevanceScore
        expr: histogram_quantile(0.25, rag_relevance_scores) < 0.5
        for: 10m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG relevance scores are low (Q25 < 0.5)"
          description: "25th percentile of relevance scores is {{ $value }}, indicating potential index quality issues"

      # Exporter Health Check
      - alert: PrometheusExporterDown
        expr: up{job="openclaw-rag-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "Prometheus exporter is down"
          description: "OpenClaw RAG metrics exporter has been down for more than 2 minutes"
