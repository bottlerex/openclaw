# OpenClaw Squid Proxy — blacklist mode (allow all, deny specific dangerous domains)

http_port 3128

# Blacklist: dangerous/blocked domains
acl blocked_domains dstdomain "/etc/squid/blocked-domains.txt"

# Port ACLs
acl SSL_ports port 443
acl SSL_ports port 9222
acl SSL_ports port 9223
acl SSL_ports port 8317
acl SSL_ports port 7788
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 7788
acl Safe_ports port 8317
acl Safe_ports port 19800
acl Safe_ports port 9222
acl Safe_ports port 9223
acl CONNECT method CONNECT

# Deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Deny blacklisted domains
http_access deny blocked_domains

# Allow everything else
http_access allow all

# Logging
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# No cache
cache deny all

# Timeouts
connect_timeout 15 seconds
request_timeout 5 minutes
read_timeout 5 minutes

# Security
via off
forwarded_for delete
