networks:
  openclaw-isolated:
    driver: bridge
services:
  openclaw:
    container_name: openclaw-agent
    env_file: .env
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    sysctls:
    - net.ipv6.conf.all.disable_ipv6=1
    - net.ipv6.conf.default.disable_ipv6=1
    environment:
    - OPENCLAW_CONSENT_MODE=false
    - OPENCLAW_GATEWAY_PORT=18789
    - OPENCLAW_BRIDGE_PORT=18790
    - ENABLE_CALENDAR=true
    - ENABLE_GMAIL=true
    - ENABLE_DRIVE=true
    - CALENDAR_CACHE_PATH=/home/node/calendar_cache
    - SCHEDULE_DAILY_DIGEST=09:00
    - TIMEZONE=Asia/Taipei
    - OPENCLAW_PRIMARY_MODEL=cliproxy/claude-haiku-4-5-20251001
    - NODE_OPTIONS=--require /home/node/.openclaw/force-ipv4.cjs --dns-result-order=ipv4first
    - OPENCLAW_HEALTH_CHECK_INTERVAL=30s
    - OPENCLAW_HEALTH_CHECK_TIMEOUT=5s
    - OPENCLAW_PROVIDER_RESTART_MAX_RETRIES=3
    - OPENCLAW_TELEGRAM_GETUPDATE_TIMEOUT=5s
    - OPENCLAW_WEBSOCKET_HEARTBEAT_INTERVAL=30s
    - OPENCLAW_WEBSOCKET_IDLE_TIMEOUT=60s
    - OPENCLAW_TOOLS_ALLOWLIST_RELOAD_INTERVAL=3600s
    - OPENCLAW_LOG_LEVEL=debug
    - OPENCLAW_CRASH_RESTART_DELAY=10s
    - NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
    - OPENCLAW_NO_RESPAWN=1
    image: ghcr.io/openclaw/openclaw:main
    networks:
    - openclaw-isolated
    ports:
    - 127.0.0.1:18788:18789
    - 0.0.0.0:9091:9090
    restart: unless-stopped
    volumes:
    - ./config:/home/node/.openclaw
    - ./workspace:/home/node/workspace
    - ./calendar_cache:/home/node/calendar_cache
    - ./gog-cli/gog:/usr/local/bin/gog:ro
    - ./gog-config:/home/node/.config/gogcli
    - ./ssh-keys:/home/node/.ssh
    - /Users/rexmacmini/.claude/projects/-Users-rexmacmini/memory:/home/node/claude-memory:ro
    - /Users/rexmacmini/.claude/rules:/home/node/claude-rules:ro
    - /Users/rexmacmini/Project/active_projects:/home/node/projects
    extra_hosts:
    - host.docker.internal:host-gateway

  nginx-https-proxy:
    image: nginx:latest
    container_name: openclaw-https-proxy
    networks:
    - openclaw-isolated
    ports:
    - 0.0.0.0:18789:18789
    volumes:
    - ./config/nginx:/etc/nginx/conf.d:ro
    - ./certs:/etc/nginx/certs:ro
    depends_on:
    - openclaw
    restart: unless-stopped
    command: nginx -g 'daemon off;'
