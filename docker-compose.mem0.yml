services:
  mem0-pgvector:
    image: pgvector/pgvector:pg16
    container_name: mem0-pgvector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: mem0secret
      POSTGRES_DB: openclaw_memory
    volumes:
      - mem0-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  mem0-data:
